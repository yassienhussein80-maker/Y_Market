<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y Market</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>

    <div id="auth-section">
        <button id="login-btn">تسجيل الدخول باستخدام جوجل</button>
        <button id="logout-btn" style="display:none;">تسجيل الخروج</button>
    </div>

    <div id="admin-panel" style="display:none;">
        <h3>لوحة التحكم (إضافة منتج)</h3>
        <input type="text" id="prod-name" placeholder="اسم المنتج">
        <input type="number" id="prod-price" placeholder="السعر">
        <button id="add-btn">نشر المنتج</button>
    </div>

    <div id="products-list">
        </div>

    <script>
        // إعدادات فايربيز المظبوطة من صورتك
        const firebaseConfig = {
            apiKey: "AIzaSyBDl0XL89fZc-ntRWsJ6SKaTaN8R-onP28",
            authDomain: "yassien-e9eb6.firebaseapp.com",
            projectId: "yassien-e9eb6",
            storageBucket: "yassien-e9eb6.firebasestorage.app",
            messagingSenderId: "613557013572",
            appId: "1:613557013572:web:fa5c08bece7c0454780011",
            measurementId: "G-6SGL8DR2TB"
        };

        // تشغيل فايربيز
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();

        // أزرار التحكم
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const adminPanel = document.getElementById('admin-panel');

        // تسجيل الدخول (استخدام Redirect عشان الموبايل)
        loginBtn.onclick = () => auth.signInWithRedirect(provider);

        // مراقبة حالة المستخدم
        auth.onAuthStateChanged(user => {
            if (user) {
                console.log("تم تسجيل الدخول:", user.displayName);
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'block';
                adminPanel.style.display = 'block';
            } else {
                loginBtn.style.display = 'block';
                logoutBtn.style.display = 'none';
                adminPanel.style.display = 'none';
            }
        });

        logoutBtn.onclick = () => auth.signOut();

        // إضافة منتج
        document.getElementById('add-btn').onclick = async () => {
            const name = document.getElementById('prod-name').value;
            const price = document.getElementById('prod-price').value;
            if(name && price) {
                await db.collection('products').add({
                    name: name,
                    price: price,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("تمت إضافة المنتج بنجاح!");
                location.reload();
            }
        };
    </script>
</body>
</html>
